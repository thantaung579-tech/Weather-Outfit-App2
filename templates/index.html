<!DOCTYPE html>
<html>
<head>
    <title>JARVIS AI Weather</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #000000);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .container {
            width: 480px;
            padding: 25px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        input {
            width: 90%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 5px 0;
            max-height: 120px;
            overflow-y: auto;
        }

        li {
            padding: 8px;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            margin: 3px 0;
            border-radius: 8px;
        }

        li:hover {
            background: rgba(255,255,255,0.3);
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #00c6ff;
            color: black;
            font-weight: bold;
        }

        .card {
            margin-top: 20px;
            padding: 15px;
            border-radius: 15px;
            background: rgba(255,255,255,0.15);
            text-align: left;
            line-height: 1.6;
        }

        .label {
            font-weight: bold;
            color: #00c6ff;
        }

        /* 🖼 IMAGE STYLE (NEW) */
        .weather-img {
            width: 100%;
            margin-top: 10px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🤖 AI WEATHER prediction clothes</h1>

    <input id="cityInput" placeholder="Search city..." onkeyup="autoComplete()">

    <ul id="list"></ul>

    <button onclick="getWeather()">Get Weather</button>

    <div id="result" class="card"></div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
